<main class="auth mobile-page"><section class="card"><h1>Registrati</h1><p class="muted">Scegli nome team e 10 squadre. Budget {{cost()}}/{{budget}} FC.</p><form [formGroup]="form" (ngSubmit)="submit()"><input class="input" placeholder="Username" formControlName="username"><input class="input" type="password" placeholder="Password" formControlName="password"><input class="input" placeholder="Nome team" formControlName="teamName"><div class="market">@for(t of teams; track t.name){<button type="button" class="team" [class.sel]="selected.includes(t.name)" (click)="toggle(t.name)"><span>{{t.name}}</span><strong>{{t.price}} FC</strong></button>}</div><button class="btn warn" [disabled]="!canSave()||loading()">Crea account</button><a class="btn secondary" routerLink="/login">Ho già un account</a></form></section></main>
