<main><h1>Classifica</h1>@if(vm$|async;as vm){<section class="card"><h2>Per punteggio</h2>@for(r of vm.fantasy; track r.uid){<div class="row"><span>#{{r.position}} {{r.teamName}}</span><strong>{{r.fantasyPoints}} pt</strong></div>}</section><section class="card"><h2>Punti incontri</h2>@for(r of vm.league; track r.uid; let i=$index){<div class="row"><span>#{{i+1}} {{r.teamName}} <small>{{r.wins}}V {{r.draws}}N {{r.losses}}P</small></span><strong>{{r.leaguePoints}}</strong></div>}</section>}</main>
