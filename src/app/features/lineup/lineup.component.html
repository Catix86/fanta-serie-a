<main><h1>Formazione</h1>@if(vm$|async;as vm){<section class="card"><h2>Giornata {{vm.round}}</h2>@if(vm.locked){<p class="muted">Formazione bloccata.</p>}@else{<p class="muted">Scegli 6 squadre tra le tue 10. Se dimentichi, vale la precedente.</p><div class="chips">@for(t of vm.me?.roster||[]; track t){<button class="chip" [class.sel]="selected.includes(t)" (click)="toggle(t)">{{t}}</button>}</div><label class="muted">Capitano</label><select class="input" [(ngModel)]="captain"><option value="">Scegli</option>@for(t of selected; track t){<option [value]="t">{{t}}</option>}</select><button class="btn warn" (click)="save(vm.round)" [disabled]="saving()">Salva formazione</button>}}</section>}</main>
