<main class="lineup-content">
  @if (vm$ | async; as vm) {
    <app-section-header
      icon="assignment"
      [title]="'Giornata ' + vm.round"
      [subtitle]="'Scadenza formazione tra: ' + countdown(vm.deadline)"
    />

    <section class="card lineup-panel">
      <div class="selected-summary">
        <span>Squadre selezionate</span>

        <strong
          [class.complete]="selected.length === size"
          [class.incomplete]="selected.length !== size"
        >
          {{ selected.length }}/{{ size }}
        </strong>
      </div>

      @if (vm.locked) {
        <p class="locked-message">Formazione bloccata per questa giornata.</p>
      } @else {
        <div class="teams-list">
          @for (teamName of vm.me?.roster || []; track teamName) {
            <button
              type="button"
              class="lineup-team-card"
              [class.selected]="isSelected(teamName)"
              [class.captain]="isCaptain(teamName)"
              (click)="toggleTeam(teamName)"
            >
              <img
                class="lineup-team-logo"
                [src]="teamLogo(teamName)"
                [alt]="teamName"
                loading="lazy"
              />

              <span class="team-info">
                <strong>{{ teamName }}</strong>
              </span>

              <span
                class="captain-button"
                [class.active]="isCaptain(teamName)"
                (click)="toggleCaptain(teamName, $event)"
              >
                <span class="material-symbols-rounded"> star </span>
              </span>
            </button>
          }
        </div>

        <button
          type="button"
          class="btn action-button primary"
          [disabled]="!canSave(vm.locked) || saving()"
          (click)="save(vm.round)"
        >
          <span class="material-symbols-rounded"> save </span>

          @if (saving()) {
            Salvataggio...
          } @else if (vm.existingLineup) {
            Aggiorna formazione
          } @else {
            Salva formazione
          }
        </button>
      }
    </section>
  }
</main>
